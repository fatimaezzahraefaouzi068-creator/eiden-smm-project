services:
  db:
    image: postgres:15-alpine
    container_name: smm_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smm_backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/smm_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLASK_ENV: development
    volumes:
      - ./backend:/app
    networks:
      - smm_network
    command: python run.py

volumes:
  postgres_data:
  redis_data:

networks:
  smm_network:
    driver: bridge